# KoraQuest 1.1 - Quest Definitions
# Author: Ipsecuz_
#
# Mỗi quest thuộc một cycle độc lập: daily, weekly, monthly, seasonal hoặc cycle custom
# được khai báo trong config.yml. Progress, reroll, giới hạn nhận và lịch reset tách riêng.
#
# Objective được KoraQuest theo dõi trực tiếp:
# KILL, BREAK, PLACE, CRAFT, FISH, ENCHANT, BREED, TAME, CONSUME, SMELT, SHEAR,
# PLAYTIME, WALK, SPRINT, SWIM, FLY, GLIDE, JUMP, CHAT, COMMAND, LOGIN,
# ITEM_PICKUP, ITEM_DROP, ITEM_SUBMIT, INTERACT_BLOCK, INTERACT_ENTITY,
# DAMAGE_DEALT, DAMAGE_TAKEN, HEAL, DIE, VISIT_LOCATION, ENTER_WORLD, ENTER_REGION,
# EXP_GAIN, LEVEL_GAIN, MONEY_EARN, MONEY_SPEND, POTION_BREW, BUCKET_FILL,
# TRADE_VILLAGER, REPAIR, ANVIL, SMITHING, STONECUT, LOOT_CHEST và CUSTOM.
#
# VOTE tự hook VotingPlugin/NuVotifier khi có plugin tương thích.
# MONEY_EARN/MONEY_SPEND theo dõi Vault và PlayerPoints bằng snapshot định kỳ.
# CUSTOM có thể nhận tiến độ từ API, admin command, mcMMO và Jobs Reborn.
#
# Optional fields:
#   cycle: daily
#   permission: koraquest.quest.example
#   cooldown-seconds: 0
#   rerollable: true
#   season-xp: 0
#   requirements:
#     - '%vault_eco_balance% >= 10000'
#   filters:
#     worlds: [survival]
#     min-y: -64
#     max-y: 320
#     weapon: DIAMOND_SWORD
#     spawn-reasons: [NATURAL]
#     require-critical-hit: false
#     regions: [mine]
#     require-own-island: false
#     require-own-plot: false
#   location:
#     world: world
#     x: 0
#     y: 64
#     z: 0
#     radius: 5
#   completion:
#     sound: ENTITY_PLAYER_LEVELUP
#     particle: TOTEM_OF_UNDYING
#
# rewards là danh sách console command và được đóng băng vào durable reward claim.
# Placeholder tích hợp sẵn: %player%, %uuid%, %quest_id%, %quest_name%, %cycle%,
# %difficulty%, %progress%, %required% và PlaceholderAPI khi được cài.
# Random range: {random:min-max}
# Ví dụ: 'eco give %player% {random:100000-200000}'

