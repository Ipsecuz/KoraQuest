# KoraQuest - Quest Definitions
# Built-in types: KILL, BREAK, PLACE, CRAFT, FISH, ENCHANT, BREED, TAME, CONSUME, SMELT, SHEAR, CUSTOM
# CUSTOM can represent any objective. Progress it with:
# /quest admin progress <player> <quest-id> [amount]
# Every quest title, lore and reward command is configured directly here.
# rewards: is only a list of custom console commands. KoraQuest does not require Vault or a specific economy/crate plugin.
# Supported placeholders: %player%, %uuid%, %quest_id%, %quest_name%, %difficulty%, %difficulty_name%, %progress%, %required%
# Optional random number syntax inside a command: {random:min-max}
# Example: 'eco give %player% {random:100000-200000}'

